# ============================================
# Gitleaks Configuration
# ============================================
# Docs: https://github.com/gitleaks/gitleaks#configuration

[source]
  include_paths = []
  exclude_paths = [
    "(?i)vendor",
    "(?i)node_modules",
    "(?i).git",
    "(?i)coverage",
    "(?i)dist",
    "(?i)build",
    "(?i).next",
    "(?i).pytest_cache",
    "(?i).venv",
    "(?i)env",
    "(?i)^.github/workflows"
  ]

[allowlist]
  description = "Allowlist for false positives"

  # k8s/base/secrets.yaml contains PLACEHOLDER_* values (base64-encoded),
  # not real secrets. They are templates replaced at deploy time.
  paths = [
    "k8s/base/secrets\\.yaml"
  ]

  commits = []

  # Allow known documentation/example tokens that are not real secrets
  regexes = [
    # OpenAPI CSRF token example: "csrf_a1b2c3d4e5f6g7h8"
    "csrf_[a-z0-9]{16}"
  ]

[extend]
  useDefault = true
