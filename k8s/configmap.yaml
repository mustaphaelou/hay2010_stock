# ConfigMap for Stock Application
apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-app-config
  namespace: stock-app
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  # Database configuration
  DB_MAX_CONNECTIONS: "20"
  DB_IDLE_TIMEOUT: "30000"
  DB_CONNECTION_TIMEOUT: "2000"
  # Redis configuration
  REDIS_MAX_RETRIES: "3"
  REDIS_CONNECT_TIMEOUT: "10000"
  REDIS_COMMAND_TIMEOUT: "5000"
  # Rate limiting
  RATE_LIMIT_WINDOW: "60"
  RATE_LIMIT_MAX_REQUESTS: "500"
---
# Secrets for Stock Application (base64 encoded)
# Note: In production, use external secrets manager (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: stock-app-secrets
  namespace: stock-app
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/hay2010_db?connection_limit=20"
  DATABASE_PRIMARY_URL: "postgresql://postgres:postgres@postgres-primary:5432/hay2010_db"
  DATABASE_REPLICA_1_URL: "postgresql://postgres:postgres@postgres-replica-1:5432/hay2010_db"
  DATABASE_REPLICA_2_URL: "postgresql://postgres:postgres@postgres-replica-2:5432/hay2010_db"
  REDIS_URL: "redis://redis:6379"
  REDIS_CLUSTER_NODES: "redis-node-0.redis-headless:6379,redis-node-1.redis-headless:6379,redis-node-2.redis-headless:6379"
  JWT_SECRET: "change-me-in-production-use-strong-secret"
