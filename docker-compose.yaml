# ============================================
# HAY2010 Stock Application - Coolify Deployment
# Version: 3.0
# ============================================
# This compose file is designed for Coolify deployment.
# Coolify manages PostgreSQL and Redis as separate services.
# Only the application service is defined here.
#
# IMPORTANT: Use Dockerfile.coolify for Coolify deployments
# to prevent Coolify's ARG injection from breaking the build.
# ============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.coolify
    image: hay2010_stock:latest
    container_name: hay2010_stock
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    # Security context
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
