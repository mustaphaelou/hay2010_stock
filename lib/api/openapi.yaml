components:
  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
      description: "API key au format hay2010_sk_live_xxxxxxxxxxxxxxxx"

  responses:
    Unauthorized:
      description: "Clé API invalide ou manquante"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: "Requête invalide"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
