        adresse_email:
          type: string
          format: email
          nullable: true
        numero_telephone:
          type: string
          maxLength: 50
          nullable: true
        numero_fax:
          type: string
          maxLength: 50
          nullable: true
        url_site_web:
          type: string
          maxLength: 255
          nullable: true
