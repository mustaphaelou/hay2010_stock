          enum: [CLIENT, FOURNISSEUR, LES_DEUX]
        adresse_email:
          type: string
          nullable: true
        numero_telephone:
          type: string
          nullable: true
        numero_fax:
          type: string
          nullable: true
        url_site_web:
          type: string
          nullable: true
        adresse_rue:
          type: string
          nullable: true
        code_postal:
          type: string
          nullable: true
        ville:
          type: string
          nullable: true
        pays:
          type: string
        numero_tva:
          type: string
          nullable: true
        numero_ice:
          type: string
          nullable: true
        numero_rc:
          type: string
          nullable: true
        delai_paiement_jours:
          type: integer
          nullable: true
        limite_credit:
          type: number
          nullable: true
        pourcentage_remise:
          type: number
        numero_compte_bancaire:
          type: string
          nullable: true
        code_banque:
          type: string
          nullable: true
        numero_iban:
          type: string
          nullable: true
        code_swift:
          type: string
          nullable: true
        est_actif:
          type: boolean
        est_bloque:
          type: boolean
        date_creation:
          type: string
          format: date-time
        date_modification:
          type: string
          format: date-time
        cree_par:
          type: string
          nullable: true
        modifie_par:
          type: string
          nullable: true
        compte_collectif:
          type: string
          nullable: true
        compte_auxiliaire:
          type: string
          nullable: true

    PartnerCreate:
      type: object
      required:
        - code_partenaire
        - nom_partenaire
      properties:
        code_partenaire:
          type: string
          minLength: 1
          maxLength: 50
        nom_partenaire:
          type: string
          minLength: 1
          maxLength: 255
        type_partenaire:
          type: string
          enum: [CLIENT, FOURNISSEUR, LES_DEUX]
