          maxLength: 50
          nullable: true
        code_banque:
          type: string
          maxLength: 20
          nullable: true
        numero_iban:
          type: string
          maxLength: 50
          nullable: true
        code_swift:
          type: string
          maxLength: 20
          nullable: true
        compte_collectif:
