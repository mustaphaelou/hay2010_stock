openapi: "3.1.0"
info:
  title: "HAY2010 Stock API"
  version: "1.0.0"
  description: "API REST pour la gestion des partenaires, documents, stock et affaires"

servers:
  - url: "/api/v1"
    description: "Base path for API v1"

security:
  - ApiKeyAuth: []

paths:
  /partenaires:
    get:
      operationId: listPartners
      summary: "Lister les partenaires"
      description: "Retourne une liste paginée de partenaires avec filtrage optionnel par type, recherche textuelle, et tri."
      tags:
        - Partenaires
      security:
        - ApiKeyAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [CLIENT, FOURNISSEUR, LES_DEUX]
          description: "Filtrer par type de partenaire"
        - name: search
          in: query
          schema:
            type: string
          description: "Recherche dans nom, code et ville"
        - name: sort
          in: query
          schema:
            type: string
            enum: [id_partenaire, code_partenaire, nom_partenaire, type_partenaire, ville, pays, date_creation, date_modification]
            default: nom_partenaire
          description: "Champ de tri"
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: "Ordre de tri"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: "Liste paginée des partenaires"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerPaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

    post:
      operationId: createPartner
      summary: "Créer un partenaire"
      description: "Crée un nouveau partenaire. Le champ cree_par est automatiquement renseigné à partir de la clé API."
      tags:
        - Partenaires
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerCreate"
      responses:
        "201":
          description: "Partenaire créé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: "Code partenaire déjà utilisé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /partenaires/{id}:
    get:
      operationId: getPartnerById
      summary: "Obtenir un partenaire par ID"
      tags:
        - Partenaires
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "Détails du partenaire"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updatePartner
      summary: "Mettre à jour un partenaire"
      description: "Mise à jour partielle. Le champ modifie_par est automatiquement renseigné."
      tags:
        - Partenaires
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerUpdate"
      responses:
        "200":
          description: "Partenaire mis à jour"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: "Code partenaire déjà utilisé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deletePartner
      summary: "Désactiver un partenaire (soft delete)"
      description: "Désactive le partenaire (est_actif = false). Le partenaire n'est pas supprimé physiquement."
      tags:
        - Partenaires
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: "Partenaire désactivé"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /partenaires/{id}/documents:
    get:
      operationId: getPartnerDocuments
      summary: "Lister les documents d'un partenaire"
      tags:
        - Partenaires
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: "Liste paginée des documents"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Document"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /produits:
    get:
      operationId: listProducts
      summary: "Lister les produits"
      description: "Retourne une liste paginée de produits avec filtrage optionnel par catégorie, famille, statut actif, recherche textuelle, et tri."
      tags:
        - Produits
      security:
        - ApiKeyAuth: []
      parameters:
        - name: categorie
          in: query
          schema:
            type: integer
          description: "Filtrer par ID de catégorie"
        - name: famille
          in: query
          schema:
            type: string
          description: "Filtrer par famille de produit"
        - name: actif
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: "Filtrer par statut actif"
        - name: search
          in: query
          schema:
            type: string
          description: "Recherche dans nom, code et code-barre EAN"
        - name: sort
          in: query
          schema:
            type: string
            enum: [id_produit, code_produit, nom_produit, famille, prix_vente, prix_achat, date_creation, date_modification]
            default: nom_produit
          description: "Champ de tri"
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: "Ordre de tri"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: "Liste paginée des produits"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

    post:
      operationId: createProduct
      summary: "Créer un produit"
      description: "Crée un nouveau produit. Le champ cree_par est automatiquement renseigné."
      tags:
        - Produits
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreate"
      responses:
        "201":
          description: "Produit créé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: "Code produit déjà utilisé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /produits/{id}:
    get:
      operationId: getProductById
      summary: "Obtenir un produit par ID"
      tags:
        - Produits
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "Détails du produit"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateProduct
      summary: "Mettre à jour un produit"
      tags:
        - Produits
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: "Produit mis à jour"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: "Code produit déjà utilisé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteProduct
      summary: "Désactiver un produit (soft delete)"
      description: "Désactive le produit (est_actif = false)."
      tags:
        - Produits
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: "Produit désactivé"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /produits/{id}/niveaux-stock:
    get:
      operationId: getProductStockLevels
      summary: "Lister les niveaux de stock d'un produit"
      tags:
        - Produits
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: "Liste paginée des niveaux de stock"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockLevelPaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /categories-produits:
    get:
      operationId: listCategories
      summary: "Lister les catégories de produits"
      tags:
        - CategoriesProduits
      security:
        - ApiKeyAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: "Recherche dans nom et code"
        - name: parent
          in: query
          schema:
            type: string
          description: "Filtrer par catégorie parente. Utiliser 'null' pour les racines."
        - name: sort
          in: query
          schema:
            type: string
            enum: [id_categorie, code_categorie, nom_categorie, date_creation, date_modification]
            default: nom_categorie
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: "Liste paginée des catégories"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryPaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createCategory
      summary: "Créer une catégorie"
      tags:
        - CategoriesProduits
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryCreate"
      responses:
        "201":
          description: "Catégorie créée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: "Code catégorie déjà utilisé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories-produits/{id}:
    get:
      operationId: getCategoryById
      summary: "Obtenir une catégorie par ID"
      tags:
        - CategoriesProduits
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "Détails de la catégorie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateCategory
      summary: "Mettre à jour une catégorie"
      tags:
        - CategoriesProduits
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: "Catégorie mise à jour"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: "Code catégorie déjà utilisé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteCategory
      summary: "Supprimer une catégorie"
      description: "Supprime la catégorie si elle n'a pas d'enfants."
      tags:
        - CategoriesProduits
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: "Catégorie supprimée"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: "Impossible de supprimer une catégorie qui a des enfants"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories-produits/{id}/enfants:
    get:
      operationId: getCategoryChildren
      summary: "Lister les sous-catégories"
      tags:
        - CategoriesProduits
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: "Liste paginée des sous-catégories"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryPaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /categories-produits/{id}/produits:
    get:
      operationId: getCategoryProducts
      summary: "Lister les produits d'une catégorie"
      tags:
        - CategoriesProduits
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: "Liste paginée des produits"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /entrepots:
    get:
      operationId: listWarehouses
      summary: "Lister les entrepôts"
      tags:
        - Entrepots
      security:
        - ApiKeyAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: "Recherche dans nom et code"
        - name: principal
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: "Filtrer par statut entrepôt principal"
        - name: sort
          in: query
          schema:
            type: string
            enum: [id_entrepot, code_entrepot, nom_entrepot, ville_entrepot, capacite_totale_unites, date_creation, date_modification]
            default: nom_entrepot
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: "Liste paginée des entrepôts"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarehousePaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createWarehouse
      summary: "Créer un entrepôt"
      tags:
        - Entrepots
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarehouseCreate"
      responses:
        "201":
          description: "Entrepôt créé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: "Code entrepôt déjà utilisé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /entrepots/{id}:
    get:
      operationId: getWarehouseById
      summary: "Obtenir un entrepôt par ID"
      tags:
        - Entrepots
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "Détails de l'entrepôt"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateWarehouse
      summary: "Mettre à jour un entrepôt"
      tags:
        - Entrepots
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarehouseUpdate"
      responses:
        "200":
          description: "Entrepôt mis à jour"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: "Code entrepôt déjà utilisé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteWarehouse
      summary: "Désactiver un entrepôt (soft delete)"
      tags:
        - Entrepots
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: "Entrepôt désactivé"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /entrepots/{id}/niveaux-stock:
    get:
      operationId: getWarehouseStockLevels
      summary: "Lister les niveaux de stock d'un entrepôt"
      tags:
        - Entrepots
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: "Liste paginée des niveaux de stock"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockLevelPaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /documents:
    get:
      operationId: listDocuments
      summary: "Lister les documents de vente"
      tags:
        - Documents
      security:
        - ApiKeyAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: "Recherche dans numéro, nom partenaire et référence externe"
        - name: type
          in: query
          schema:
            type: string
          description: "Filtrer par type de document"
        - name: domaine
          in: query
          schema:
            type: string
          description: "Filtrer par domaine"
        - name: statut
          in: query
          schema:
            type: string
          description: "Filtrer par statut"
        - name: partenaire
          in: query
          schema:
            type: integer
          description: "Filtrer par ID partenaire"
        - name: affaire
          in: query
          schema:
            type: integer
          description: "Filtrer par ID affaire"
        - name: sort
          in: query
          schema:
            type: string
            enum: [id_document, numero_document, type_document, domaine_document, etat_document, date_document, montant_ht, montant_ttc, statut_document, date_creation, date_modification]
            default: date_document
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: "Liste paginée des documents"
          content:
            application/json:
              schema:
