# ============================================
# HAY2010 Stock Application - Production Docker Compose
# Version: 6.0
# ============================================
#
# PURPOSE:
#   Production VPS deployment with hardened security,
#   file-based secrets, resource limits, and no exposed
#   internal service ports.
#
# USAGE:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml exec app npx tsx prisma/seed.ts
#
# REQUIRED ENV VARS (set in .env.docker or shell):
#   POSTGRES_PASSWORD, JWT_SECRET, REDIS_PASSWORD
#
# MIGRATIONS:
#   Run automatically by the app entrypoint before server startup.
#
# ============================================

services:

  # ============================================
  # APPLICATION SERVICE
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        PORT: "3000"
        GIT_SHA: ${GIT_SHA:-production}
        BUILD_DATE: ${BUILD_DATE:-2026-01-01}
    image: hay2010_stock:${APP_VERSION:-latest}
    container_name: hay2010_stock
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hay2010_db}?connection_limit=5&pool_timeout=10"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      JWT_EXPIRES_IN: "24h"
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-HAY2010 Stock}"
      NEXT_PUBLIC_COMPANY_NAME: "${NEXT_PUBLIC_COMPANY_NAME:-HAY2010}"
      NEXT_PUBLIC_APP_VERSION: "${APP_VERSION:-1.0.0}"
      SECURE_COOKIES: "true"
      LOCKOUT_FAIL_CLOSED: "true"
      RATE_LIMIT_FAIL_CLOSED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/public"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - backend
      - frontend
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # POSTGRESQL DATABASE
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: hay2010_postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: "${POSTGRES_DB:-hay2010_db}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hay2010_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # REDIS CACHE
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: hay2010_redis
    environment:
      REDISCLI_AUTH: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# NETWORKS
#   backend:  internal-only for DB/Redis communication
#   frontend: allows app outbound internet + host port exposure
# ============================================
networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
