# ============================================
# HAY2010 Stock Application - Production Deployment
# Version: 3.0
# ============================================
# Purpose: Full production stack with monitoring and backup
# Use case: Production deployments with observability
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml logs -f
#   docker-compose -f docker-compose.prod.yml down
#
# Requirements:
#   - .env.docker file with production secrets
#   - SSL certificates for ingress (if using)
#   - Configure Grafana password in .env.docker
#
# Services included:
#   - migrate: Database migration runner
#   - app: Next.js application (port 3000)
#   - postgres: PostgreSQL 16 database
#   - redis: Redis 7 cache
#   - prometheus: Metrics collection (port 9090)
#   - alertmanager: Alert routing (port 9093)
#   - grafana: Metrics visualization (port 3001)
#   - backup: Automated daily database backups
#   - worker: Background job processor
#   - postgres-exporter: PostgreSQL metrics (port 9187)
#   - redis-exporter: Redis metrics (port 9121)
#
# Network topology:
#   - frontend: Exposed services (app)
#   - backend: Internal services (database, monitoring) - isolated
# ============================================

services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: hay2010_migrate
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?connection_limit=5&pool_timeout=10
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - backend

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        - PORT=3000
        - GIT_SHA=${GIT_SHA:-unknown}
        - BUILD_DATE=${BUILD_DATE:-unknown}
    image: hay2010_stock:latest
    container_name: hay2010_stock
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?connection_limit=5&pool_timeout=10
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: hay2010_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: hay2010_redis
    restart: always
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.48.0@sha256:b440bc0e8aa5bab44a782952c09516b6a50f9d7b2325c1ffafac7bc833298e2e
    container_name: hay2010_prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  alertmanager:
    image: prom/alertmanager:v0.26.0@sha256:361db356b33041437517f1cd298462055580585f26555c317df1a3caf2868552
    container_name: hay2010_alertmanager
    restart: always
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    ports:
      - "9093:9093"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  grafana:
    image: grafana/grafana:10.2.0@sha256:1ee0c54286b8ca09a3dd1419ff8653e7780a148a006ac088544203bb0affe550
    container_name: hay2010_grafana
    restart: always
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  backup:
    image: postgres:16-alpine
    container_name: hay2010_backup
    restart: always
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - ./backups:/backups
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    command: >
      sh -c "while true; do /backup.sh; sleep 86400; done"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: hay2010_worker
    restart: always
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
      - WORKER_MODE=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "dist/lib/workers/index.js"]
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  postgres-exporter:
    image: prom/postgres-exporter:v0.12.0
    container_name: hay2010_postgres_exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: redis/redis-exporter:v1.55.0
    container_name: hay2010_redis_exporter
    environment:
      - REDIS_ADDR=redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "9121:9121"
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  next_cache:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
