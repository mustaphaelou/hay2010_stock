name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: stock_app/package-lock.json

      - name: Install dependencies
        working-directory: stock_app
        run: npm ci

      - name: Run ESLint
        working-directory: stock_app
        run: npm run lint

      - name: TypeScript check
        working-directory: stock_app
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: stock_app/package-lock.json

      - name: Install dependencies
        working-directory: stock_app
        run: npm ci

      - name: Run tests
        working-directory: stock_app
        run: npm run test:ci
        continue-on-error: true

  build-check:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only)
        uses: docker/build-push-action@v5
        with:
          context: ./stock_app
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build status
        if: success()
        run: |
          echo "Build validation passed - Coolify will handle deployment"
