# ============================================
# HAY2010 Stock Application - Docker Compose
# Version: 6.0
# ============================================
#
# PURPOSE:
#   Local development + VPS deployment with file-based secrets
#
# USAGE:
#   1. Copy .env.docker.example to .env.docker and set your secrets
#   2. Create secret files: ./secrets/db_password, ./secrets/redis_password, ./secrets/jwt_secret
#   3. Start:  docker compose up -d
#   4. Logs:   docker compose logs -f
#   5. Stop:   docker compose down
#   6. Rebuild: docker compose build --no-cache && docker compose up -d
#   7. Seed:   docker compose exec app npx tsx prisma/seed.ts
#   8. Reset:  docker compose down -v && docker compose up -d
#
# MIGRATIONS:
#   Run automatically by the app entrypoint before server startup.
#   No separate migrate service needed.
#
# SERVICES:
#   - app:      Next.js application with built-in migrations (port 3000)
#   - postgres: PostgreSQL 16 database (port 5432)
#   - redis:    Redis 7 cache (port 6379)
#
# ============================================

services:

  # ============================================
  # APPLICATION SERVICE
  # Next.js application with built-in migrations
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        PORT: "3000"
        GIT_SHA: ${GIT_SHA:-local}
        BUILD_DATE: ${BUILD_DATE:-2026-01-01}
    image: hay2010_stock:${APP_VERSION:-0.1.1}
    container_name: hay2010_stock
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "${REDIS_URL}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-24h}"
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-HAY2010 Stock}"
      NEXT_PUBLIC_COMPANY_NAME: "${NEXT_PUBLIC_COMPANY_NAME:-HAY2010}"
      NEXT_PUBLIC_APP_VERSION: "${APP_VERSION:-0.1.1}"
      SECURE_COOKIES: "${SECURE_COOKIES:-false}"
      LOCKOUT_FAIL_CLOSED: "false"
      RATE_LIMIT_FAIL_CLOSED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/public"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - backend
      - frontend
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # POSTGRESQL DATABASE
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: hay2010_postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-hay2010_db}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hay2010_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # REDIS CACHE
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: hay2010_redis
    environment:
      REDISCLI_AUTH: "${REDIS_PASSWORD}"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# NETWORKS
#   backend:  internal-only for DB/Redis communication
#   frontend: allows app to expose ports and reach internet
# ============================================
networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
