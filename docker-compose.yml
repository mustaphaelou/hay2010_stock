# ============================================
# HAY2010 Stock Application - Docker Compose
# Version: 3.0 (Optimized for Stability)
# ============================================
# Production-ready deployment with Docker Secrets
# 
# Usage:
#   1. Generate secrets: cd secrets && ./generate-secrets.sh
#   2. Start: docker-compose up -d
#   3. Logs:  docker-compose logs -f app
#   4. Stop:   docker-compose down
#
# Services:
#   - migrate: One-time database migration runner
#   - app: Next.js application (port 3000)
#   - postgres: PostgreSQL 16 database
#   - redis: Redis 7 cache
# ============================================

# =====================================================
# SECRETS CONFIGURATION
# =====================================================
# Secrets are mounted from ./secrets/ directory
# Generate with: ./secrets/generate-secrets.sh
# =====================================================
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt

# =====================================================
# SERVICES
# =====================================================
services:
  # -------------------------------------------------
  # MIGRATION SERVICE
  # Runs once to apply database migrations
  # -------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: hay2010_migrate
    secrets:
      - postgres_password
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - DATABASE_URL=postgresql://postgres:$(cat /run/secrets/postgres_password)@postgres:5432/hay2010_db?connection_limit=5&pool_timeout=10
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  # -------------------------------------------------
  # APPLICATION SERVICE
  # Next.js application server
  # -------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        - PORT=3000
        - GIT_SHA=${GIT_SHA:-unknown}
        - BUILD_DATE=${BUILD_DATE:-unknown}
    image: hay2010_stock:latest
    container_name: hay2010_stock
    ports:
      - "3000:3000"
    secrets:
      - postgres_password
      - redis_password
      - jwt_secret
    environment:
      # Database connection (constructed from secrets)
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - DATABASE_URL=postgresql://postgres:@postgres:5432/hay2010_db?connection_limit=5&pool_timeout=10
      # Redis connection (constructed from secrets)
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - REDIS_URL=redis://:@redis:6379/0
      # JWT configuration
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - JWT_EXPIRES_IN=24h
      # Application configuration
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_APP_NAME=HAY2010 Stock
      # Security configuration
      - SECURE_COOKIES=true
      - LOCKOUT_FAIL_CLOSED=true
      - RATE_LIMIT_FAIL_CLOSED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    networks:
      - frontend
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -------------------------------------------------
  # POSTGRESQL DATABASE
  # Primary data store
  # -------------------------------------------------
  postgres:
    image: postgres:16-alpine@sha256:8baec7c0c1f9a537b3f79a7a86f9a9e1d8d2f5c6e1f7a8b9c0d1e2f3a4b5c6d7
    container_name: hay2010_postgres
    secrets:
      - postgres_password
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - POSTGRES_USER=postgres
      - POSTGRES_DB=hay2010_db
      # Read password from file in entrypoint
      - POSTGRES_PASSWORD=
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hay2010_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Custom entrypoint to read password from secret file
    entrypoint:
      - /bin/sh
      - -c
      - |
        export POSTGRES_PASSWORD=$$(cat /run/secrets/postgres_password)
        exec docker-entrypoint.sh postgres

  # -------------------------------------------------
  # REDIS CACHE
  # Session storage and caching
  # -------------------------------------------------
  redis:
    image: redis:7-alpine@sha256:a0b3e2a8d6b9c4e5f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0
    container_name: hay2010_redis
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    command: >
      sh -c "redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --requirepass $$(cat /run/secrets/redis_password)"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$(cat /run/secrets/redis_password)", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# =====================================================
# VOLUMES
# =====================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =====================================================
# NETWORKS
# =====================================================
# Network topology for security:
# - frontend: Exposed to external traffic (app only)
# - backend: Internal only, no external access
# =====================================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
