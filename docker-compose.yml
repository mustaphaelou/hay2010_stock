# ============================================
# HAY2010 Stock Application - Standard Deployment
# Version: 3.0
# ============================================
# Purpose: Full-stack deployment with app + PostgreSQL + Redis
# Use case: Development, testing, and standard production deployments
#
# Usage:
#   docker-compose up -d           # Start all services
#   docker-compose logs -f app     # Follow app logs
#   docker-compose down            # Stop and remove containers
#   docker-compose down -v         # Stop and remove containers + volumes
#
# Requirements:
#   - .env.docker file with environment variables
#   - Docker Engine 20.10+ with BuildKit
#
# Services included:
#   - migrate: One-time database migration runner
#   - app: Next.js application (port 3000)
#   - postgres: PostgreSQL 16 database (port 5432, localhost only)
#   - redis: Redis 7 cache (port 6379, localhost only)
# ============================================

services:
  # Migration service - runs once to apply migrations
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: hay2010_migrate
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-hay2010_db}?connection_limit=5&pool_timeout=10
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    # Security context
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - backend

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        - PORT=3000
        - GIT_SHA=${GIT_SHA:-unknown}
        - BUILD_DATE=${BUILD_DATE:-unknown}
    image: hay2010_stock:latest
    container_name: hay2010_stock
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-hay2010_db}?connection_limit=5&pool_timeout=10
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security context
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - frontend
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: hay2010_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hay2010_db}
    # Only expose to localhost for development
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hay2010_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Security context
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: hay2010_redis
    # Only expose to localhost for development
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --requirepass ${REDIS_PASSWORD:-redis}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    # Security context - Redis needs SETUID/SETGID for user switching
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  next_cache:

# Network Segmentation:
# - frontend: Exposed to external traffic via port 3000
# - backend: Internal only, protects database and redis from direct external access
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
