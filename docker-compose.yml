name: hay2010

services:
  postgres:
    image: postgres:16-alpine
    container_name: hay2010_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB: ${POSTGRES_DB:-hay2010_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hay2010_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
      args:
        JWT_SECRET: ${JWT_SECRET:-dev-secret-key-min-32-chars-long-for-jwt}
    container_name: hay2010_migrate
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:devpass@postgres:5432/hay2010_db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-min-32-chars-long-for-jwt}
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["setup"]
    command: ./node_modules/.bin/prisma migrate deploy

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
      args:
        JWT_SECRET: ${JWT_SECRET:-dev-secret-key-min-32-chars-long-for-jwt}
    container_name: hay2010_seed
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:devpass@postgres:5432/hay2010_db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-min-32-chars-long-for-jwt}
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["setup"]
    command: npx --no-install tsx prisma/seed.ts

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JWT_SECRET: ${JWT_SECRET:-dev-secret-key-min-32-chars-long-for-jwt}
    container_name: hay2010_app
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:devpass@postgres:5432/hay2010_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-min-32-chars-long-for-jwt}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/public"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
