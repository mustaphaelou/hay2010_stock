# Docker Compose configuration for scaled production deployment
# Includes: PgBouncer, Redis Cluster, PostgreSQL with replicas support

version: '3.8'

services:
  # =====================================================
  # APPLICATION LAYER
  # =====================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hay2010_stock:latest
    container_name: hay2010_stock_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@pgbouncer:6432/hay2010_db?pgbouncer=true
      - DATABASE_PRIMARY_URL=postgresql://postgres:postgres@postgres_primary:5432/hay2010_db
      - DATABASE_REPLICA_1_URL=postgresql://postgres:postgres@postgres_replica_1:5432/hay2010_db
      - DATABASE_REPLICA_2_URL=postgresql://postgres:postgres@postgres_replica_2:5432/hay2010_db
      - REDIS_URL=redis://redis-cluster:6379
      - REDIS_CLUSTER_NODES=redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required for production}
      depends_on:
      pgbouncer:
        condition: service_healthy
      redis-cluster-proxy:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =====================================================
  # CONNECTION POOLING - PgBouncer
  # =====================================================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: hay2010_pgbouncer
    restart: always
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres_primary:5432/hay2010_db
      - PGBOUNCER_POOL_MODE=transaction
      - PGBOUNCER_MAX_CLIENT_CONN=1000
      - PGBOUNCER_DEFAULT_POOL_SIZE=50
      - PGBOUNCER_MIN_POOL_SIZE=10
      - PGBOUNCER_RESERVE_POOL_SIZE=20
      - PGBOUNCER_RESERVE_POOL_TIMEOUT=3
      - PGBOUNCER_QUERY_TIMEOUT=30
      - PGBOUNCER_SERVER_IDLE_TIMEOUT=300
      - PGBOUNCER_SERVER_CONNECT_TIMEOUT=3
      - PGBOUNCER_CLIENT_IDLE_TIMEOUT=0
      - PGBOUNCER_CLIENT_LOGIN_TIMEOUT=5
      - PGBOUNCER_LOG_STATS=1
      - PGBOUNCER_STATS_PERIOD=60
    ports:
      - "6432:6432"
    depends_on:
      postgres_primary:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pgbouncer -u pgbouncer pgbouncer -p 6432 -R || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # =====================================================
  # POSTGRESQL PRIMARY + REPLICAS
  # =====================================================
  postgres_primary:
    image: postgres:16-alpine
    container_name: hay2010_postgres_primary
    restart: always
    environment:
    POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    POSTGRES_DB: ${POSTGRES_DB:-hay2010_db}
    POSTGRES_REPLICATION_USER: replicator
    POSTGRES_REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:?REPLICATION_PASSWORD is required}
    command: >
      postgres -c wal_level=replica -c max_wal_senders=3 -c max_replication_slots=3 -c wal_keep_size=256MB -c shared_buffers=256MB -c effective_cache_size=1GB -c maintenance_work_mem=128MB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c default_statistics_target=100 -c random_page_cost=1.1 -c effective_io_concurrency=200 -c work_mem=16MB -c min_wal_size=1GB -c max_wal_size=4GB
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hay2010_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  postgres_replica_1:
    image: postgres:16-alpine
    container_name: hay2010_postgres_replica_1
    restart: always
    environment:
    POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    POSTGRES_DB: ${POSTGRES_DB:-hay2010_db}
    PGUSER: replicator
    PGPASSWORD: ${REPLICATION_PASSWORD:?REPLICATION_PASSWORD is required}
    command: >
      bash -c "
        until pg_basebackup -h postgres_primary -D /var/lib/postgresql/data -U replicator -Fp -Xs -P -R; do
          echo 'Waiting for primary to be ready...';
          sleep 5;
        done;
        chmod 700 /var/lib/postgresql/data;
        exec postgres
      "
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica_1_data:/var/lib/postgresql/data
    depends_on:
      postgres_primary:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hay2010_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  postgres_replica_2:
    image: postgres:16-alpine
    container_name: hay2010_postgres_replica_2
    restart: always
    environment:
    POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    POSTGRES_DB: ${POSTGRES_DB:-hay2010_db}
    PGUSER: replicator
    PGPASSWORD: ${REPLICATION_PASSWORD:?REPLICATION_PASSWORD is required}
    command: >
      bash -c "
        until pg_basebackup -h postgres_primary -D /var/lib/postgresql/data -U replicator -Fp -Xs -P -R; do
          echo 'Waiting for primary to be ready...';
          sleep 5;
        done;
        chmod 700 /var/lib/postgresql/data;
        exec postgres
      "
    ports:
      - "5434:5432"
    volumes:
      - postgres_replica_2_data:/var/lib/postgresql/data
    depends_on:
      postgres_primary:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hay2010_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # =====================================================
  # REDIS CLUSTER (3 masters + 3 replicas)
  # =====================================================
  redis-node-1:
    image: redis:7-alpine
    container_name: hay2010_redis_node_1
    restart: always
    command: >
      redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru --save 60 1000
    ports:
      - "7000:6379"
      - "17000:16379"
    volumes:
      - redis_node_1_data:/data
    networks:
      - app-network

  redis-node-2:
    image: redis:7-alpine
    container_name: hay2010_redis_node_2
    restart: always
    command: >
      redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru --save 60 1000
    ports:
      - "7001:6379"
      - "17001:16379"
    volumes:
      - redis_node_2_data:/data
    networks:
      - app-network

  redis-node-3:
    image: redis:7-alpine
    container_name: hay2010_redis_node_3
    restart: always
    command: >
      redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru --save 60 1000
    ports:
      - "7002:6379"
      - "17002:16379"
    volumes:
      - redis_node_3_data:/data
    networks:
      - app-network

  redis-node-4:
    image: redis:7-alpine
    container_name: hay2010_redis_node_4
    restart: always
    command: >
      redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru --save 60 1000
    ports:
      - "7003:6379"
      - "17003:16379"
    volumes:
      - redis_node_4_data:/data
    networks:
      - app-network

  redis-node-5:
    image: redis:7-alpine
    container_name: hay2010_redis_node_5
    restart: always
    command: >
      redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru --save 60 1000
    ports:
      - "7004:6379"
      - "17004:16379"
    volumes:
      - redis_node_5_data:/data
    networks:
      - app-network

  redis-node-6:
    image: redis:7-alpine
    container_name: hay2010_redis_node_6
    restart: always
    command: >
      redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru --save 60 1000
    ports:
      - "7005:6379"
      - "17005:16379"
    volumes:
      - redis_node_6_data:/data
    networks:
      - app-network

  # Redis cluster initialization
  redis-cluster-init:
    image: redis:7-alpine
    container_name: hay2010_redis_cluster_init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    command: >
      sh -c "
        sleep 10 &&
        redis-cli --cluster create
        redis-node-1:6379
        redis-node-2:6379
        redis-node-3:6379
        redis-node-4:6379
        redis-node-5:6379
        redis-node-6:6379
        --cluster-replicas 1 --cluster-yes
      "
    networks:
      - app-network

  # Redis cluster proxy for simplified connection
  redis-cluster-proxy:
    image: redislabs/redis-cluster-proxy:latest
    container_name: hay2010_redis_proxy
    restart: always
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
    command: >
      redis-cluster-proxy --port 6379 --bind 0.0.0.0 redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
    ports:
      - "6379:6379"
    networks:
      - app-network

volumes:
  postgres_primary_data:
  postgres_replica_1_data:
  postgres_replica_2_data:
  redis_node_1_data:
  redis_node_2_data:
  redis_node_3_data:
  redis_node_4_data:
  redis_node_5_data:
  redis_node_6_data:


networks:
  app-network:
    driver: bridge
